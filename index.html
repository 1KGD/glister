<!DOCTYPE html>
<html>

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira:wght@100..900&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json" crossorigin="use-credentials" />
    <style>
        body {
            background-color: black;
        }

        #root {
            position: absolute;
            top: 0px;
            left: 0px;
            background-color: black;
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            margin: 0px;
            overflow: clip;
            font-family: "Saira", sans-serif;
            font-optical-sizing: auto;
            animation: fade-in 2s 1;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .loader {
            width: 80px;
            margin: auto;
            margin-bottom: 0px;
            aspect-ratio: 1;
            border: 10px solid #000;
            box-sizing: border-box;
            background:
                radial-gradient(farthest-side, #fff 98%, #0000) top,
                radial-gradient(farthest-side, #fff 98%, #0000) top,
                radial-gradient(farthest-side, #fff 98%, #0000) left,
                radial-gradient(farthest-side, #fff 98%, #0000) right,
                radial-gradient(farthest-side, #fff 98%, #0000) bottom,
                #000;
            background-size: 20px 20px;
            background-repeat: no-repeat;
            filter: blur(4px) contrast(10);
            animation: l19 2s infinite;
        }

        @keyframes l19 {
            0% {
                background-position: top, top, left, right, bottom
            }

            25% {
                background-position: right, top, left, right, bottom
            }

            50% {
                background-position: bottom, top, left, right, bottom
            }

            75% {
                background-position: left, top, left, right, bottom
            }

            100% {
                background-position: top, top, left, right, bottom
            }
        }
    </style>
</head>

<body>
    <div id="root">
        <div class="loader"></div>
        <h2 style="margin: auto; margin-top: 0px; animation: fade-in 1s 1">Loading...</h2>
    </div>
    <script preload type="module" src="./src/client/index.tsx"></script>
</body>

</html>
